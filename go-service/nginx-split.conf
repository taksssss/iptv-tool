# nginx-split.conf
# Strangler-pattern traffic split: route selected paths to Go service,
# everything else falls back to the existing PHP service.
#
# Phase 1 – proxy only
# Phase 2 – playlist.m3u
# Phase 3 – epg.xml / t.xml*
# Phase 4 – full takeover

upstream php_backend {
    server 127.0.0.1:80;
    keepalive 16;
}

upstream go_backend {
    server 127.0.0.1:8080;
    keepalive 64;
}

server {
    listen 5678;
    server_name _;

    # ── Phase 1: stream proxy ────────────────────────────────────────────
    location /proxy {
        proxy_pass         http://go_backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host $host;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # Disable buffering for streaming responses
        proxy_buffering    off;
        proxy_read_timeout 0;
    }

    # ── Phase 2: M3U / TXT playlists ─────────────────────────────────────
    location ~ ^/playlist\.(m3u|txt)$ {
        proxy_pass         http://go_backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host $host;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Phase 3: EPG / XMLTV ─────────────────────────────────────────────
    location ~ ^/(epg\.xml(\.gz)?|t\.xml(\.gz)?)$ {
        proxy_pass         http://go_backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host $host;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Fallback: PHP ─────────────────────────────────────────────────────
    location / {
        proxy_pass         http://php_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
